<style>
  .hover-box {
    background-color: white;
    padding: 48px 160px;
    border-radius: 40px;
    font-family: sans-serif;
    text-align: center;
    transition: all 0.3s ease;
    width: fit-content;
    display: inline-block;
    position: relative;
    cursor: pointer;
    height: 120px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
  }

  .hover-box img {
    transition: opacity 0.3s ease;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 100%;
    height: auto;
  }

  /* Logoların yüksekliği */
  .logo-1,
  .logo-2 {
    height: 20%;
  }

  /* İlk görünende lacivert logo aktif */
  .logo-blue {
    opacity: 1;
    z-index: 1;
  }

  /* Hover ile beyaz logo aktif olacak */
  .logo-white {
    opacity: 0;
    z-index: 2;
  }

  /* Hover efekti: arka plan mora döner */
  .hover-box:hover {
    background-color: #9a2fff;
  }

  .hover-box:hover .logo-blue {
    opacity: 0;
  }

  .hover-box:hover .logo-white {
    opacity: 1;
  }
</style>

<div class="hover-box">
  <!-- Lacivert logo -->
  <img src="https://r.resimlink.com/cfvxgjL.png" class="logo-blue logo-1" alt="İş Bankası Lacivert Logo">

  <!-- Beyaz logo -->
  <img src="https://r.resimlink.com/q-QZyFwn.png" class="logo-white logo-2" alt="İş Bankası Beyaz Logo">
</div>
